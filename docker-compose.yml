# Sarvhit — Docker Compose (Development)
# Usage: docker-compose up

version: "3.9"

services:
  # ---------- Frontend (React + Vite) ----------
  client:
    build:
      context: ./client
      dockerfile: ../infra/docker/client.Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src
      - ./shared:/app/shared
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api/v1
    depends_on:
      - server

  # ---------- Backend (Node + Express) ----------
  server:
    build:
      context: ./server
      dockerfile: ../infra/docker/server.Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./server/src:/app/src
      - ./shared:/app/shared
    env_file:
      - .env
    depends_on:
      - mongo

  # ---------- Database (MongoDB) ----------
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sarvhit

volumes:
  mongo_data:
